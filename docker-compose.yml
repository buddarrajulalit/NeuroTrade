version: '3.9'

services:
  # ── PostgreSQL ───────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: neurotrade-db
    environment:
      POSTGRES_DB: neurotrade
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Spring Boot Backend ──────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: neurotrade-backend
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: neurotrade
      DB_USER: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: NeuroTradeSecretKey2024!!VeryLongAndSecureBase64EncodedString
      JWT_EXPIRATION_MS: 86400000
      CORS_ORIGINS: http://localhost:5173
      SERVER_PORT: 8080
    depends_on:
      postgres:
        condition: service_healthy

  # ── React Frontend ───────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: neurotrade-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
