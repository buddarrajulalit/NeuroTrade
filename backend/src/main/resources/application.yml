server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: neurotrade-backend

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:neurotrade}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: UTC

neurotrade:
  jwt:
    secret: ${JWT_SECRET:NeuroTradeSecretKey2024!!VeryLongAndSecureBase64EncodedString}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}   # 24 hours
    refresh-expiration-ms: ${JWT_REFRESH_EXP_MS:604800000} # 7 days

  stock:
    simulation:
      interval-ms: 1000         # Price update every 1 second
      volatility-base: 0.02     # 2% base volatility
      trend-strength: 0.001     # 1% trend influence

  trading:
    initial-wallet-balance: 100000.00   # $100,000 virtual cash

  ai:
    insights:
      enabled: true
      model: rule-based           # rule-based | openai | anthropic
      openai-api-key: ${OPENAI_API_KEY:}
      anthropic-api-key: ${ANTHROPIC_API_KEY:}

cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}

logging:
  level:
    com.neurotrade: DEBUG
    org.springframework.security: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
